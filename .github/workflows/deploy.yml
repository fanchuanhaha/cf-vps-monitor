name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment
        required: false
        type: choice
        default: production
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deploy_environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Verify build
        run: npm run verify:cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Resolve JWT secret
        id: jwt
        run: |
          set -euo pipefail
          if [ -n "${EXISTING_JWT_SECRET:-}" ]; then
            JWT_SECRET="$EXISTING_JWT_SECRET"
            echo "status=existing" >> "$GITHUB_OUTPUT"
          else
            JWT_SECRET=$(openssl rand -hex 32)
            echo "status=generated" >> "$GITHUB_OUTPUT"
          fi
          echo "::add-mask::$JWT_SECRET"
          {
            echo "value<<EOF"
            echo "$JWT_SECRET"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          EXISTING_JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply cf-vps-monitor-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set JWT secret
        run: printf '%s' "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET: ${{ steps.jwt.outputs.value }}

      - name: Deploy Worker
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
