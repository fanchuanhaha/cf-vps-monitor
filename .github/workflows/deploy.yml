name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
        type: string
      deploy_environment:
        description: Deployment environment
        required: false
        type: choice
        default: production
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.deploy_environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run verify:cloudflare

      - name: Resolve JWT secret
        id: jwt
        run: |
          set -euo pipefail
          if [ -n "${EXISTING_JWT_SECRET:-}" ]; then
            JWT_SECRET="$EXISTING_JWT_SECRET"
            echo "status=existing" >> "$GITHUB_OUTPUT"
          else
            JWT_SECRET=$(openssl rand -hex 32)
            echo "status=generated" >> "$GITHUB_OUTPUT"
          fi
          # Avoid leaking the secret in workflow logs.
          echo "::add-mask::$JWT_SECRET"
          {
            echo "value<<EOF"
            echo "$JWT_SECRET"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          EXISTING_JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ github.event.inputs.cloudflare_account_id }}
          command: |
            set -euo pipefail
            d1 migrations apply cf-vps-monitor-db --remote
            printf '%s' "$JWT_SECRET" | wrangler secret put JWT_SECRET
            wrangler deploy --keep-vars
        env:
          JWT_SECRET: ${{ steps.jwt.outputs.value }}
