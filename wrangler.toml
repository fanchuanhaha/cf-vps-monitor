name = "cf-vps-monitor"
main = "worker/src/index.ts"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true
head_sampling_rate = 1

[placement]
mode = "smart"

[triggers]
crons = ["*/2 * * * *"]

[[durable_objects.bindings]]
name = "LIVE_DATA"
class_name = "LiveDataDO"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveDataDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimitDO"]

[[d1_databases]]
binding = "DB"
database_name = "cf-vps-monitor-db"
database_id = "cf-vps-monitor-db"

[vars]
CURRENT_GIT_COMMIT = ""

[assets]
directory = "frontend/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ping", "/agent/*"]
